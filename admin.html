<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BussidMyanmar - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .admin-container { width: 100%; max-width: 1200px; background: #1e293b; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2, h3 { margin-bottom: 15px; color: #38bdf8; text-align: center; }
        
        .verify-box, .panel-content { display: none; }
        input, textarea, select { width: 100%; padding: 12px 15px; margin: 8px 0; border: 1px solid #475569; border-radius: 10px; background: #334155; color: white; font-size: 15px; outline: none; }
        .btn { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn:hover { background: #0369a1; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        
        /* 3 Columns Dashboard Grid */
        .dashboard-grid { display: grid; grid-template-columns: 100%; gap: 25px; margin-top: 20px; }
        @media (min-width: 950px) { .dashboard-grid { grid-template-columns: 31% 31% 34%; } }
        
        .ctrl-card { background: #0f172a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        /* Table Style */
        .table-wrapper { overflow-x: auto; background: #1e293b; border-radius: 10px; padding: 5px; max-height: 380px; margin-top: 10px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #334155; word-break: break-all; }
        th { color: #38bdf8; background: #0f172a; position: sticky; top: 0; z-index: 5; }
        
        .action-btn { padding: 5px 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
        .ban-btn { background: #ef4444; color: white; }
        .ban-btn:hover { background: #dc2626; }
        .unban-btn { background: #22c55e; color: white; }
        .unban-btn:hover { background: #16a34a; }
        
        .status-active { color: #22c55e; font-weight: bold; background: rgba(34, 197, 94, 0.1); padding: 3px 8px; border-radius: 20px; display: inline-block; }
        .status-banned { color: #ef4444; font-weight: bold; background: rgba(239, 68, 68, 0.1); padding: 3px 8px; border-radius: 20px; display: inline-block; }
        .logout-btn { background: #475569; margin-top: 20px; width: 150px; }
    </style>
</head>
<body>

<div class="admin-container">
    
    <div id="loginStep">
        <h2>Admin Authentication</h2>
        <input type="email" id="adminEmail" placeholder="Admin Email">
        <input type="password" id="adminPass" placeholder="Admin Password">
        <button class="btn" onclick="adminLogin()">Login</button>
    </div>

    <div id="verifyStep" class="verify-box">
        <h2>Security Check</h2>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 10px;">ကျေးဇူးပြု၍ Admin Username ထည့်သွင်းပါ</p>
        <input type="text" id="adminUserKey" placeholder="Admin Username">
        <button class="btn" onclick="verifyAdminKey()">Verify & Enter</button>
    </div>

    <div id="adminPanel" class="panel-content">
        <h2>KCMT BUSSID - Super Admin Dashboard</h2>
        
        <div class="dashboard-grid">
            
            <div class="ctrl-card">
                <h3>Rules Control</h3>
                <select id="ruleSelect" onchange="checkRuleType()">
                    <option value="new">[ စည်းကမ်းချက်အသစ်ထည့်ရန် ]</option>
                </select>
                <input type="text" id="ruleTitle" placeholder="ခေါင်းစဉ်">
                <textarea id="ruleContent" rows="4" placeholder="စည်းကမ်းချက် အသေးစိတ်..."></textarea>
                <select id="ruleImportant">
                    <option value="false">သာမန် စည်းကမ်းချက်</option>
                    <option value="true">အရေးကြီး စည်းကမ်းချက် (လိမ္မော်ကွက်)</option>
                </select>
                <button class="btn" onclick="saveRule()">Save Rule</button>
                <button class="btn btn-danger" id="delRuleBtn" style="display:none;" onclick="deleteRule()">Delete Rule</button>
                
                <hr style="border: 1px solid #334155; margin: 15px 0;">
                <h3>Page Contacts</h3>
                <input type="text" id="rulesContactInput" placeholder="Rules Page ဆက်သွယ်ရန်စာသား">
                <button class="btn" onclick="saveContact('rules_page', 'rulesContactInput')">Update Contact</button>
            </div>
            
            <div class="ctrl-card">
                <h3>Skin Price Control</h3>
                <input type="text" id="skinName" placeholder="ကားအမျိုးအစား">
                <input type="text" id="skinPrice" placeholder="ဈေးနှုန်း">
                <button class="btn" onclick="addSkinPrice()">Add Skin Price</button>
                
                <div class="table-wrapper" style="max-height: 200px;">
                    <table>
                        <thead><tr><th>Name</th><th>Price</th><th>Action</th></tr></thead>
                        <tbody id="skinTableBody"></tbody>
                    </table>
                </div>

                <hr style="border: 1px solid #334155; margin: 15px 0;">
                <input type="text" id="skinContactInput" placeholder="Skin Page ဆက်သွယ်ရန်စာသား">
                <button class="btn" onclick="saveContact('skin_page', 'skinContactInput')">Update Contact</button>
            </div>
            
            <div class="ctrl-card">
                <h3>User Management</h3>
                <p style="font-size: 12px; color: #38bdf8; text-align: center; font-weight: bold;" id="userCount">စုစုပေါင်း: 0 ယောက်</p>
                
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>User Email</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            </tbody>
                    </table>
                </div>
                
                <hr style="border: 1px solid #334155; margin: 15px 0;">
                <h3>Broadcast Announcement</h3>
                <textarea id="broadcastMsg" rows="3" placeholder="User အားလုံးဆီ တစ်ပြိုင်နက်စာပို့ရန်..."></textarea>
                <button class="btn" onclick="sendBroadcast()">Send Announcement</button>
            </div>

        </div>
        <button class="btn logout-btn" onclick="adminLogout()">Logout Panel</button>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC2bUX2HzRYeRxQ8ogZ4t9Fe8MF3Kze_rI",
      authDomain: "bussidmyanmar.firebaseapp.com",
      databaseURL: "https://bussidmyanmar-default-rtdb.firebaseio.com",
      projectId: "bussidmyanmar",
      storageBucket: "bussidmyanmar.firebasestorage.app",
      messagingSenderId: "280052704185",
      appId: "1:280052704185:web:275ad6c0eaab6aef5bcc68",
      measurementId: "G-2ZDDZRYH18"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let loadedRules = {};

    function adminLogin() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPass').value;
        if(!email || !pass) return alert("Email နှင့် Password ဖြည့်စွက်ပါ");

        auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                document.getElementById('loginStep').style.display = 'none';
                document.getElementById('verifyStep').style.display = 'block';
            }).catch(() => alert("ဝင်ရောက်ခွင့်မရှိပါ သို့မဟုတ် အချက်အလက်မှားယွင်းနေပါသည်။"));
    }

    function verifyAdminKey() {
        // Admin Username 'Bussid' ဖြစ်ရမည်
        if (document.getElementById('adminUserKey').value === "Bussid") {
            document.getElementById('verifyStep').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            initAdminDashboard();
        } else { alert("Admin Username Key မှားယွင်းနေပါသည်။"); }
    }

    function initAdminDashboard() {
        loadUsers();
        loadSkinPrices();
        loadRulesDropdown();
        
        db.ref('app_data/contacts/rules_page').once('value', s => { if(s.val()) document.getElementById('rulesContactInput').value = s.val(); });
        db.ref('app_data/contacts/skin_page').once('value', s => { if(s.val()) document.getElementById('skinContactInput').value = s.val(); });
    }

    /* --- Realtime User List & Management --- */
    function loadUsers() {
        db.ref('users').on('value', (snapshot) => {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";
            
            if(!snapshot.exists()) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#94a3b8;">User စာရင်းမရှိသေးပါ</td></tr>`;
                document.getElementById('userCount').innerText = "စုစုပေါင်း: 0 ယောက်";
                return;
            }

            let count = 0;
            snapshot.forEach(child => {
                count++;
                const userId = child.key;
                const userData = child.val();
                
                const statusBadge = userData.isBanned ? 
                    `<span class="status-banned">Banned</span>` : 
                    `<span class="status-active">Active</span>`;
                
                const actionButton = userData.isBanned ? 
                    `<button class="action-btn unban-btn" onclick="changeUserStatus('${userId}', false)">Unban</button>` : 
                    `<button class="action-btn ban-btn" onclick="changeUserStatus('${userId}', true)">Ban User</button>`;

                tbody.innerHTML += `<tr>
                    <td>${userData.email}</td>
                    <td>${statusBadge}</td>
                    <td>${actionButton}</td>
                </tr>`;
            });
            document.getElementById('userCount').innerText = `စုစုပေါင်း: ${count} ယောက်`;
        });
    }

    function changeUserStatus(userId, banState) {
        const confirmText = banState ? "ဤဝင်ရောက်သူကို တကယ် Ban မှာ သေချာပါသလား?" : "ဤဝင်ရောက်သူကို Unban ပေးမှာ သေချာပါသလား?";
        if(confirm(confirmText)) {
            db.ref('users/' + userId).update({ isBanned: banState })
              .then(() => alert("User Management လုပ်ဆောင်ချက် အောင်မြင်ပါသည်"));
        }
    }

    /* --- Rules Control Logic --- */
    function loadRulesDropdown() {
        db.ref('app_data/rules').on('value', (snapshot) => {
            const select = document.getElementById('ruleSelect');
            select.innerHTML = '<option value="new">[ စည်းကမ်းချက်အသစ်ထည့်ရန် ]</option>';
            loadedRules = snapshot.val() || {};
            Object.keys(loadedRules).forEach(key => {
                select.innerHTML += `<option value="${key}">${loadedRules[key].title}</option>`;
            });
            checkRuleType();
        });
    }

    function checkRuleType() {
        const val = document.getElementById('ruleSelect').value;
        if(val === "new") {
            document.getElementById('ruleTitle').value = "";
            document.getElementById('ruleContent').value = "";
            document.getElementById('delRuleBtn').style.display = "none";
        } else {
            document.getElementById('ruleTitle').value = loadedRules[val].title;
            document.getElementById('ruleContent').value = loadedRules[val].content;
            document.getElementById('ruleImportant').value = loadedRules[val].isImportant ? "true" : "false";
            document.getElementById('delRuleBtn').style.display = "block";
        }
    }

    function saveRule() {
        const val = document.getElementById('ruleSelect').value;
        const title = document.getElementById('ruleTitle').value;
        const content = document.getElementById('ruleContent').value;
        const isImportant = document.getElementById('ruleImportant').value === "true";

        if(!title || !content) return alert("အချက်အလက်ပြည့်စုံစွာဖြည့်ပါ");

        if(val === "new") {
            db.ref('app_data/rules').push({ title, content, isImportant });
        } else {
            db.ref('app_data/rules/' + val).update({ title, content, isImportant });
        }
        alert("စည်းကမ်းချက် သိမ်းဆည်းပြီးပါပြီ!");
    }

    function deleteRule() {
        const val = document.getElementById('ruleSelect').value;
        if(val !== "new" && confirm("ဤစည်းကမ်းချက်ကို ဖျက်ရန် သေချာပါသလား?")) {
            db.ref('app_data/rules/' + val).remove();
        }
    }

    /* --- Skin Price Logic --- */
    function addSkinPrice() {
        const name = document.getElementById('skinName').value;
        const price = document.getElementById('skinPrice').value;
        if(!name || !price) return alert("အချက်အလက် ဖြည့်စွက်ပါ");

        db.ref('app_data/skin_prices').push({ name, price }).then(() => {
            document.getElementById('skinName').value = "";
            document.getElementById('skinPrice').value = "";
        });
    }

    function loadSkinPrices() {
        db.ref('app_data/skin_prices').on('value', (snapshot) => {
            const tbody = document.getElementById('skinTableBody');
            tbody.innerHTML = "";
            snapshot.forEach(child => {
                tbody.innerHTML += `<tr>
                    <td>${child.val().name}</td>
                    <td>${child.val().price}</td>
                    <td><button class="action-btn ban-btn" style="padding:2px 6px;" onclick="db.ref('app_data/skin_prices/${child.key}').remove()">Remove</button></td>
                </tr>`;
            });
        });
    }

    function saveContact(pageKey, inputId) {
        const text = document.getElementById(inputId).value;
        db.ref('app_data/contacts/' + pageKey).set(text).then(() => alert("Contact ပြောင်းလဲမှု အောင်မြင်သည်"));
    }

    function sendBroadcast() {
        const msg = document.getElementById('broadcastMsg').value;
        if(!msg) return alert("စာသားရေးပါ");
        db.ref('broadcast').set({ message: msg, timestamp: Date.now() }).then(() => {
            alert("Broadcast Annoucement ပို့ပြီးပါပြီ");
            document.getElementById('broadcastMsg').value = "";
        });
    }

    function adminLogout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
